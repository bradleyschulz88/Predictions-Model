<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4ade80">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Win predictions for MLB, NFL, NBA, World Cup, EPL and AFL">
  <title>Sports Predictions Dashboard</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="eyebrow">ESPN Schedule + Predictions</p>
        <h1 id="dashboard-title">Sports Predictions Dashboard</h1>
      </div>
      <div class="controls">
        <label class="field">
          <span>Sport</span>
          <select id="sport-select">
            <option value="overview">All sports</option>
            <option value="mlb" selected>MLB Baseball</option>
            <option value="nfl">NFL Football</option>
            <option value="nba">NBA Basketball</option>
            <option value="worldcup">FIFA World Cup</option>
            <option value="epl">Premier League</option>
            <option value="afl">AFL</option>
          </select>
        </label>
        <label class="field" id="date-field">
          <span>Date</span>
          <select id="date-select" title="Pick a schedule date"></select>
        </label>
        <label class="field">
          <span>Filter</span>
          <select id="confidence-filter">
            <option value="0">All games</option>
            <option value="55">Lean+ (55%+)</option>
            <option value="65">Strong picks (65%+)</option>
          </select>
        </label>
        <label class="field">
          <span>Search</span>
          <input id="team-search" type="search" placeholder="Team name…" autocomplete="off">
        </label>
        <label class="field" id="market-filter-wrap">
          <span>Market</span>
          <select id="view-filter">
            <option value="Spread|MoneyLine|Total">All main markets</option>
            <option value="Spread">Spread only</option>
            <option value="MoneyLine">Moneyline only</option>
            <option value="Total">Totals only</option>
          </select>
        </label>
        <label class="toggle">
          <input id="live-scores" type="checkbox" checked>
          <span>Live scores</span>
        </label>
        <label class="toggle">
          <input id="auto-refresh" type="checkbox">
          <span>Auto-refresh (2m)</span>
        </label>
        <button id="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <section class="stats" id="stats">
      <article class="stat-card">
        <p class="stat-label">Games</p>
        <p class="stat-value" id="stat-games">—</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Top pick</p>
        <p class="stat-value stat-small" id="stat-top-pick">—</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Accuracy (7d)</p>
        <p class="stat-value stat-small" id="stat-accuracy">—</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">League</p>
        <p class="stat-value stat-small" id="stat-league">—</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Schedule date</p>
        <p class="stat-value stat-small" id="stat-date">—</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Freshness</p>
        <p class="stat-value stat-small" id="stat-freshness">—</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Last updated</p>
        <p class="stat-value stat-small" id="stat-updated">—</p>
      </article>
    </section>

    <section id="accuracy-panel" class="accuracy-panel hidden"></section>
    <section id="top-picks" class="top-picks hidden"></section>
    <p id="freshness-note" class="freshness-note hidden"></p>
    <div id="banner" class="banner hidden"></div>
    <main id="games" class="games"></main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
