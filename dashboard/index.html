<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Win predictions for MLB, NFL, NBA, WNBA, World Cup, EPL and AFL">
  <title>Sports Predictions Dashboard</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="ambient-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header shell-card sticky-header">
      <div class="header-top">
        <div class="header-brand-compact">
          <span class="brand-mark" aria-hidden="true"></span>
          <h1 id="dashboard-title" class="header-title">Sports Predictions</h1>
        </div>
        <div class="header-actions">
          <label class="field field-inline">
            <span class="sr-only">Sport</span>
            <select id="sport-select" aria-label="Sport">
              <option value="overview">All sports</option>
              <option value="mlb" selected>MLB</option>
              <option value="nfl">NFL</option>
              <option value="nba">NBA</option>
              <option value="wnba">WNBA</option>
              <option value="worldcup">World Cup</option>
              <option value="epl">EPL</option>
              <option value="afl">AFL</option>
            </select>
          </label>
          <button type="button" class="btn-filter-chip" id="filter-open-btn" aria-haspopup="dialog" aria-controls="filter-sheet">
            Filters
          </button>
          <button id="refresh-btn" type="button" class="btn-primary btn-compact">Refresh</button>
        </div>
      </div>

      <div class="day-bar" id="date-field">
        <div class="date-controls">
          <button type="button" class="btn-icon date-nav-btn" id="date-prev" title="Previous day" aria-label="Previous day">‹</button>
          <button type="button" id="date-display" class="date-display-btn" title="Pick a schedule date" aria-haspopup="dialog">Pick date</button>
          <input type="date" id="date-picker-input" class="date-picker-input" aria-hidden="true" tabindex="-1" />
          <button type="button" class="btn-icon date-nav-btn" id="date-next" title="Next day" aria-label="Next day">›</button>
        </div>
        <div class="date-quick" id="date-quick"></div>
        <p class="date-hint sr-only" id="date-hint"></p>
      </div>

      <div class="filter-panel-desktop" id="filter-panel-desktop">
        <div class="toolbar-row toolbar-secondary">
          <label class="field">
            <span>Confidence</span>
            <select id="confidence-filter">
              <option value="0">All games</option>
              <option value="55">Lean+ (55%+)</option>
              <option value="65">Strong picks (65%+)</option>
            </select>
          </label>
          <label class="field">
            <span>Search</span>
            <input id="team-search" type="search" placeholder="Team name…" autocomplete="off">
          </label>
          <label class="toggle">
            <input id="live-scores" type="checkbox" checked>
            <span>Live scores</span>
          </label>
          <label class="toggle">
            <input id="auto-refresh" type="checkbox">
            <span>Auto-refresh (2m)</span>
          </label>
        </div>
      </div>
    </header>

    <div class="page-bar shell-card">
      <nav class="view-tabs" id="view-tabs" aria-label="Dashboard views">
        <button type="button" class="view-tab active" data-view="predictions">
          <span class="view-tab-label view-tab-label-full">Predictions</span>
          <span class="view-tab-label view-tab-label-short">Picks</span>
        </button>
        <button type="button" class="view-tab" data-view="accuracy">
          <span class="view-tab-label view-tab-label-full">Accuracy</span>
          <span class="view-tab-label view-tab-label-short">Record</span>
        </button>
        <button type="button" class="view-tab" data-view="model-tracker">
          <span class="view-tab-label view-tab-label-full">Tracker</span>
          <span class="view-tab-label view-tab-label-short">Track</span>
        </button>
        <button type="button" class="view-tab" data-view="my-bets">
          <span class="view-tab-label view-tab-label-full">My Bets</span>
          <span class="view-tab-label view-tab-label-short">Bets</span>
        </button>
      </nav>
      <label class="field field-compact page-bar-odds">
        <span>Odds</span>
        <select id="odds-format">
          <option value="decimal">Decimal</option>
          <option value="american">American</option>
        </select>
      </label>
    </div>

    <div id="banner" class="banner hidden" role="status" aria-live="polite">
      <p id="banner-summary" class="banner-summary"></p>
      <details id="banner-details" class="banner-details hidden">
        <summary>More details</summary>
        <p id="banner-detail-text" class="banner-detail-text"></p>
      </details>
    </div>

    <div id="predictions-view">
      <section class="stats-strip stats-ticker" id="stats" aria-busy="false">
        <div class="stat-item stat-item-primary">
          <span class="stat-label">Games</span>
          <span class="stat-value tabular-nums" id="stat-games">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Picks</span>
          <span class="stat-value tabular-nums" id="stat-picks">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Strong</span>
          <span class="stat-value tabular-nums" id="stat-strong">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Lean</span>
          <span class="stat-value tabular-nums" id="stat-lean">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Live</span>
          <span class="stat-value tabular-nums" id="stat-live">—</span>
        </div>
        <div class="stat-item stat-item-meta">
          <span class="stat-label">Updated</span>
          <span class="stat-value stat-value-sm" id="stat-updated">—</span>
        </div>
        <span class="sr-only" id="stat-top-pick" aria-hidden="true"></span>
        <span class="sr-only" id="stat-league" aria-hidden="true"></span>
        <span class="sr-only" id="stat-date" aria-hidden="true"></span>
        <span class="sr-only" id="stat-freshness" aria-hidden="true"></span>
      </section>

      <section id="model-day-result" class="model-day-result hidden" aria-label="Model pick record for this day"></section>

      <section id="top-picks" class="top-picks featured-pick hidden" aria-label="Top pick"></section>
      <p id="freshness-note" class="freshness-note hidden"></p>
      <main id="games" class="games scoreboard-list" aria-busy="false"></main>
    </div>

    <section id="accuracy-view" class="accuracy-view hidden" aria-label="Model accuracy"></section>

    <section id="my-bets-view" class="my-bets-view hidden" aria-label="Personal bet tracker"></section>
    <section id="model-tracker-view" class="model-tracker-view my-bets-view hidden" aria-label="Model pick tracker"></section>
  </div>

  <div class="filter-sheet-backdrop hidden" id="filter-sheet-backdrop" aria-hidden="true"></div>
  <div class="filter-sheet hidden" id="filter-sheet" role="dialog" aria-modal="true" aria-labelledby="filter-sheet-title">
    <div class="filter-sheet-head">
      <h2 id="filter-sheet-title">Filters</h2>
      <button type="button" class="btn-icon filter-sheet-close" id="filter-close-btn" aria-label="Close filters">×</button>
    </div>
    <div class="filter-sheet-body">
      <label class="field">
        <span>Confidence</span>
        <select id="confidence-filter-mobile">
          <option value="0">All games</option>
          <option value="55">Lean+ (55%+)</option>
          <option value="65">Strong picks (65%+)</option>
        </select>
      </label>
      <label class="field">
        <span>Search</span>
        <input id="team-search-mobile" type="search" placeholder="Team name…" autocomplete="off">
      </label>
      <label class="toggle">
        <input id="live-scores-mobile" type="checkbox" checked>
        <span>Live scores</span>
      </label>
      <label class="toggle">
        <input id="auto-refresh-mobile" type="checkbox">
        <span>Auto-refresh (2m)</span>
      </label>
    </div>
    <button type="button" class="btn-primary filter-sheet-apply" id="filter-apply-btn">Apply</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
