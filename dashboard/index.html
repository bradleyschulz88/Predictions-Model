<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060a12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Win predictions for MLB, NFL, NBA, WNBA, World Cup, EPL and AFL">
  <title>Sports Predictions Dashboard</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="ambient-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header shell-card">
      <div class="header-brand">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">ESPN Schedule + Predictions</p>
            <h1 id="dashboard-title">Sports Predictions Dashboard</h1>
          </div>
        </div>
      </div>

      <div class="header-toolbar">
        <div class="toolbar-row toolbar-primary">
          <label class="field">
            <span>Sport</span>
            <select id="sport-select">
              <option value="overview">All sports</option>
              <option value="mlb" selected>MLB Baseball</option>
              <option value="nfl">NFL Football</option>
              <option value="nba">NBA Basketball</option>
              <option value="wnba">WNBA Basketball</option>
              <option value="worldcup">FIFA World Cup</option>
              <option value="epl">Premier League</option>
              <option value="afl">AFL</option>
            </select>
          </label>

          <div class="field" id="date-field">
            <span>Date</span>
            <div class="date-controls">
              <button type="button" class="btn-icon date-nav-btn" id="date-prev" title="Previous day" aria-label="Previous day">‹</button>
              <button type="button" id="date-display" class="date-display-btn" title="Pick a schedule date" aria-haspopup="dialog">Pick date</button>
              <input type="date" id="date-picker-input" class="date-picker-input" aria-hidden="true" tabindex="-1" />
              <button type="button" class="btn-icon date-nav-btn" id="date-next" title="Next day" aria-label="Next day">›</button>
            </div>
            <div class="date-quick" id="date-quick"></div>
            <p class="date-hint" id="date-hint"></p>
          </div>

          <button id="refresh-btn" type="button" class="btn-primary">Refresh</button>
        </div>

        <details class="filter-panel" id="filter-panel">
          <summary>
            <span class="filter-summary-label filter-summary-long">Filters &amp; options</span>
            <span class="filter-summary-label filter-summary-short">Filters</span>
          </summary>
          <div class="toolbar-row toolbar-secondary">
            <label class="field">
              <span>Confidence</span>
              <select id="confidence-filter">
                <option value="0">All games</option>
                <option value="55">Lean+ (55%+)</option>
                <option value="65">Strong picks (65%+)</option>
              </select>
            </label>
            <label class="field">
              <span>Search</span>
              <input id="team-search" type="search" placeholder="Team name…" autocomplete="off">
            </label>
            <label class="field" id="market-filter-wrap">
              <span>Market</span>
              <select id="view-filter">
                <option value="Spread|MoneyLine|Total">All main markets</option>
                <option value="Spread">Spread only</option>
                <option value="MoneyLine">Moneyline only</option>
                <option value="Total">Totals only</option>
              </select>
            </label>
            <label class="toggle">
              <input id="live-scores" type="checkbox" checked>
              <span>Live scores</span>
            </label>
            <label class="toggle">
              <input id="auto-refresh" type="checkbox">
              <span>Auto-refresh (2m)</span>
            </label>
          </div>
        </details>
      </div>
    </header>

    <div class="page-bar shell-card">
      <nav class="view-tabs" id="view-tabs" aria-label="Dashboard views">
        <button type="button" class="view-tab active" data-view="predictions">
          <span class="view-tab-label view-tab-label-full">Predictions</span>
          <span class="view-tab-label view-tab-label-short">Picks</span>
        </button>
        <button type="button" class="view-tab" data-view="my-bets">
          <span class="view-tab-label view-tab-label-full">My Bets</span>
          <span class="view-tab-label view-tab-label-short">Bets</span>
        </button>
        <button type="button" class="view-tab" data-view="model-tracker">
          <span class="view-tab-label view-tab-label-full">Model Tracker</span>
          <span class="view-tab-label view-tab-label-short">Model</span>
        </button>
      </nav>
      <label class="field field-compact page-bar-odds">
        <span>Odds</span>
        <select id="odds-format">
          <option value="decimal">Decimal</option>
          <option value="american">American</option>
        </select>
      </label>
    </div>

    <div id="banner" class="banner hidden" role="status" aria-live="polite">
      <p id="banner-summary" class="banner-summary"></p>
      <details id="banner-details" class="banner-details hidden">
        <summary>More details</summary>
        <p id="banner-detail-text" class="banner-detail-text"></p>
      </details>
    </div>

    <div id="predictions-view">
      <section class="stats-strip" id="stats">
        <div class="stat-item stat-item-primary">
          <span class="stat-label">Games</span>
          <span class="stat-value" id="stat-games">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Top pick</span>
          <span class="stat-value stat-value-sm" id="stat-top-pick">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">League</span>
          <span class="stat-value stat-value-sm" id="stat-league">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Schedule</span>
          <span class="stat-value stat-value-sm" id="stat-date">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Source</span>
          <span class="stat-value stat-value-sm" id="stat-freshness">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Updated</span>
          <span class="stat-value stat-value-sm" id="stat-updated">—</span>
        </div>
      </section>

      <section id="accuracy-panel" class="accuracy-panel hidden" aria-label="Model accuracy record"></section>

      <section id="model-day-result" class="model-day-result hidden" aria-label="Model pick record for this day"></section>

      <section id="top-picks" class="top-picks hidden"></section>
      <p id="freshness-note" class="freshness-note hidden"></p>
      <main id="games" class="games"></main>
    </div>

    <section id="my-bets-view" class="my-bets-view hidden" aria-label="Personal bet tracker"></section>
    <section id="model-tracker-view" class="model-tracker-view my-bets-view hidden" aria-label="Model pick tracker"></section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
