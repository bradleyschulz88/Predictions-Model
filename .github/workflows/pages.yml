name: Publish GitHub Pages dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare docs site
        run: |
          mkdir -p docs/data
          cp dashboard/index.html docs/index.html
          cp dashboard/app.js docs/app.js
          cp dashboard/styles.css docs/styles.css
          cp dashboard/manifest.json docs/manifest.json
          cp dashboard/sw.js docs/sw.js

      - name: Build dashboard JSON
        run: python scripts/build_pages_data.py

      - name: Commit accuracy log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/accuracy.json docs/data/predictions_log.json || true
          git diff --staged --quiet || git commit -m "Update prediction accuracy [skip ci]"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
